name: wlan_pros_toolbox
description: "WLAN Pros Toolbox — 60 RF calculators, live network diagnostics, and reference tables for Wi-Fi and network professionals."
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

# The following defines the version and build number for your application.
# A version number is three numbers separated by dots, like 1.2.43
# followed by an optional build number separated by a +.
# Both the version and the builder number may be overridden in flutter
# build by specifying --build-name and --build-number, respectively.
# In Android, build-name is used as versionName while build-number used as versionCode.
# Read more about Android versioning at https://developer.android.com/studio/publish/versioning
# In iOS, build-name is used as CFBundleShortVersionString while build-number is used as CFBundleVersion.
# Read more about iOS versioning at
# https://developer.apple.com/library/archive/documentation/General/Reference/InfoPlistKeyReference/Articles/CoreFoundationKeys.html
# In Windows, build-name is used as the major, minor, and patch parts
# of the product and file versions while build-number is used as the build suffix.
version: 1.0.0+9

environment:
  sdk: ^3.12.0

# Dependencies specify other packages that your package needs in order to work.
# To automatically upgrade your package dependencies to the latest versions
# consider running `flutter pub upgrade --major-versions`. Alternatively,
# dependencies can be manually updated by changing the version numbers below to
# the latest version available on pub.dev. To see which dependencies have newer
# versions available, run `flutter pub outdated`.
dependencies:
  flutter:
    sdk: flutter

  # The following adds the Cupertino Icons font to your application.
  # Use with the CupertinoIcons class for iOS style icons.
  cupertino_icons: ^1.0.8

  # Typography (IBM Plex Sans / DM Mono / Roboto Mono per GL-003 §3 / §8.5)
  # ships as bundled Flutter font families declared in the `flutter: fonts:`
  # block below — no google_fonts runtime resolution. Dependency removed
  # 2026-06-01 once every GoogleFonts.* call was swapped to plain fontFamily.

  # Active-network services layer (lib/services/network/):
  # network_info_plus — Wi-Fi link details (SSID/BSSID/gateway/submask/IP)
  #   that dart:io NetworkInterface does not expose. Used by Interface Info.
  network_info_plus: ^6.1.1
  # basic_utils — DnsUtils.lookupRecord over DNS-over-HTTPS (Google/Cloudflare
  #   JSON resolvers). MIT, pure-Dart, actively maintained. Used by DNS Lookup.
  #   Chosen over raw UDP/53 so the query traverses HTTPS:443 uniformly across
  #   iOS/Android/macOS/Windows with only the standard network-client
  #   capability we already declare for the port scanner.
  basic_utils: ^5.7.0
  # Real ICMP echo / TTL-walk for icmp_ping_screen + mobile_traceroute_screen,
  # wrapped ONLY in lib/services/network/dart_ping_icmp_backend.dart (the service
  # and screens stay package-agnostic).
  #   dart_ping (BSD-3) — Android: spawns the system `ping`; `ttl:` maps to
  #     `ping -t <ttl>` (Linux/Android) so a TTL-walk names each hop on the
  #     "From <ip> ... Time to live exceeded" line. On macOS desktop it would
  #     spawn /sbin/ping, which the macOS App Sandbox BLOCKS (GL-008) — so the
  #     backend is never constructed on desktop (IcmpService gates it to
  #     sandboxedDesktop) and the existing TCP-probe Ping stays the desktop path.
  #   dart_ping_ios (BSD-3 → flutter_icmp_ping MIT, GBPing/SimplePing) — iOS:
  #     real ICMP echo only. Its adapter drops the `ttl` arg and never decodes
  #     ICMP Time-Exceeded, so iOS TTL-walk traceroute stays honest-unavailable.
  dart_ping: ^9.0.1
  dart_ping_ios: ^4.0.2

  # url_launcher — opens external links in the SYSTEM BROWSER. Two consumers:
  # the About screen (WLAN Pros contact form, wlanpros.com, thewlpc.com) and the
  # Educational Resources detail screen's "Open website" button, both via
  # launchUrl(..., mode: LaunchMode.externalApplication). The canonical
  # Flutter-team plugin for opening URLs; chosen over the iOS-only Shortcuts
  # bridge `openUrl` because both surfaces ship on macOS too (the bridge channel
  # is absent off iOS). https opens fine on iOS + macOS with NO ATS exception and
  # NO macOS entitlement (a browser hand-off, not an in-app cleartext fetch —
  # GL-008). First-party, lightweight, no API key. BSD-3.
  url_launcher: ^6.3.0

  # shared_preferences — persists the user's Light/Dark/System appearance pick
  # (GL-003 §8.20.5) across launches. BSD-3-Clause, first-party Flutter plugin,
  # App-Store-safe; backed by NSUserDefaults (iOS/macOS) / SharedPreferences
  # (Android) / localStorage (web). No network, no entitlement. Only consumer is
  # the ThemeController (lib/theme/theme_controller.dart): an explicit Light/Dark
  # choice is stored and restored; System re-reads the OS appearance each launch.
  shared_preferences: ^2.3.0

  # fl_chart — the live latency-trend line chart behind the Ping Plotter tool
  # (ping_plotter_screen.dart, Wave B 2026-06-04). BSD-3-Clause, App-Store-safe,
  # pure-Dart Canvas rendering (no platform channel, no network, no native
  # plugin), so it adds no entitlement and runs identically on iOS + macOS. Used
  # ONLY for the Ping Plotter chart; the rest of the app's lightweight sparklines
  # stay on the in-house CustomPaint widgets. The chart is decorative for screen
  # readers (an accessible text summary of current/min/avg/max/jitter/loss sits
  # beside it in a live region), so fl_chart carries no a11y obligation of its
  # own here.
  fl_chart: ^0.69.0

  # pretty_qr_code — renders the QR Code Generator tool (Batch 4b). Pure-Dart;
  # MIT, depending on `qr` (BSD-3). Chosen over qr_flutter (4.1.0, last touched
  # 2022) because pretty_qr_code (3.6.0) is the actively maintained option and
  # exposes a clean per-module / per-background color API — exactly what GL-003
  # §8.19 needs (dark modules on a white tile, ≥4-module quiet zone, never an
  # inverted on-brand QR). No network, no platform channel — local computation.
  pretty_qr_code: ^3.6.0

  # just_audio — plays the generated DTMF tones (Batch 4c). MIT. Chosen for FULL
  # macOS coverage (sharedDarwinSource: iOS + macOS) plus Android + web, vs a
  # mobile-only engine. Tones are synthesized to raw PCM/WAV in pure Dart
  # (lib/data/dtmf.dart) and streamed to just_audio via an in-memory
  # StreamAudioSource — no temp file, no bundled asset, no network (GL-008).
  just_audio: ^0.10.5

  # flutter_svg — renders the per-tool Tier-2 icons (assets/tool-icons/<id>.svg)
  # and the in-tool concept graphics (assets/tool-graphics/<id>.svg) per GL-003
  # §8.6 / §8.6.1 / §8.6.2. Icons are single-color and runtime-tinted via
  # ColorFilter(BlendMode.srcIn); concept graphics are dark-baked two-value
  # diagrams rendered as decorative header bands. MIT.
  flutter_svg: ^2.0.17

  # geolocator — live device GPS for the Lat / Long tool's "Use my location"
  # affordance (latitude / longitude / altitude / horizontal accuracy). The
  # Flutter-community canonical location plugin. MIT.
  #   iOS: Core Location via NSLocationWhenInUseUsageDescription (already
  #     declared in ios/Runner/Info.plist for the SSID gate; the string copy was
  #     broadened to cover the GPS read).
  #   macOS: Core Location, gated by com.apple.security.personal-information.
  #     location (already declared in *.entitlements for the SSID gate) +
  #     NSLocationUsageDescription / NSLocationWhenInUseUsageDescription in
  #     macos/Runner/Info.plist (copy broadened to cover the GPS read). On a Mac
  #     with no GPS hardware, Core Location returns a Wi-Fi-derived (coarse) fix;
  #     the UI labels accuracy/altitude as approximate accordingly (honest
  #     state, GL-008 / Truthfulness Audit). Android: deferred — runtime
  #     ACCESS_FINE_LOCATION permission + manifest entry not yet added (the tool
  #     degrades to the honest "unavailable" state on Android until then).
  geolocator: ^14.0.2

  # flutter_map — the embedded "plot my location" map preview in the Lat / Long
  # tool (Batch 3, item #13). BSD-3-Clause; pulls in latlong2 (BSD-3) for its
  # LatLng type. A pure-Dart Leaflet-style slippy-map widget that fetches raster
  # tiles over HTTPS — no native plugin, no platform channel, so it adds NO
  # entitlement and runs identically on iOS + macOS + web.
  #   TILES: OpenStreetMap standard raster (https://tile.openstreetmap.org),
  #     ONLINE-ONLY. The OSMF tile-usage policy is honored as a HARD rule:
  #       * a UNIQUE app User-Agent is set on the tile provider (no library
  #         default), and
  #       * NO offline caching / NO tile pre-fetch (the default in-memory image
  #         cache only; no on-disk tile store, no bulk download) — the policy
  #         forbids pre-fetching and bulk caching.
  #     Attribution is mandatory and legal (GL-003 §8.18): a persistent,
  #     non-dismissable, TAPPABLE "© OpenStreetMap contributors" credit on a
  #     dark scrim chip, linking to openstreetmap.org/copyright. Rendered via
  #     flutter_map's RichAttributionWidget so it can never be omitted.
  #   No routing, no search, no geocoding — a single read-only marker at the
  #   plotted coordinate with basic pan/zoom.
  flutter_map: ^8.3.0
  # latlong2 — the BSD-3 LatLng value type flutter_map uses (and that
  # LocationMap imports directly to build the marker/center point). Declared
  # explicitly because lib/widgets/location_map.dart imports it by name.
  latlong2: ^0.9.1

  # net_quality — the backend-agnostic, pure-Dart network-quality engine
  # (latency / jitter / loss / throughput / responsiveness + popular-site
  # reachability). Local path package under packages/. Consumed by the Network
  # Quality tool (net_quality_screen.dart); the screen depends only on the
  # QualityClient seam, never on a concrete probe.
  net_quality:
    path: packages/net_quality

  # share_plus + path_provider — power the "share / download" action on the PDF
  # reference cards (pdf_reference_screen.dart). On native (iOS/macOS/Android) the
  # bundled asset bytes are copied to a temp file in getTemporaryDirectory() with
  # a clean human filename, then handed to the OS share sheet (Save to Files /
  # AirDrop / Mail / Print) via Share.shareXFiles — no macOS entitlement change
  # (share sheet, not NSSavePanel). On web a browser anchor-download is used
  # instead (kIsWeb branch in lib/data/pdf_download_*.dart), so neither package's
  # native channel is exercised on web. share_plus is BSD-3; path_provider BSD-3.
  share_plus: ^10.1.4
  path_provider: ^2.1.5
  # web — the modern, wasm-safe browser interop used by the web body of the PDF
  # download seam (lib/data/pdf_download_web.dart: Blob + object-URL anchor
  # download). Declared explicitly because that file imports package:web
  # directly; it is only compiled on the web target (conditional import).
  web: ^1.1.0

  # pdfx — renders the bundled "PDF reference card" tools (Keith's 10 laminated
  # Excel→PDF exports) in a pinch-zoomable viewer. Chosen over flutter_pdfview
  # because flutter_pdfview is mobile-only (no macOS); pdfx uses Apple PDFKit on
  # BOTH iOS and macOS (PdfiumAndroid on Android, pdf.js on web), so one viewer
  # covers the iOS + macOS targets the Toolbox ships first
  # (project-toolbox-platform-scope). MIT. No network — loads from rootBundle.
  pdfx: ^2.9.2
  device_info_plus: ^12.4.0

  # mDNS / DNS-SD service discovery for the SPIKE-HSD-01 LAN-discovery prototype
  # is provided by an IN-HOUSE native plugin over Apple's Network framework
  # `NWBrowser` (ios/Runner/MdnsBrowseChannel.swift +
  # macos/Runner/MdnsBrowseChannel.swift, an in-Runner Swift EventChannel
  # mirroring the ARP / Wi-Fi channels). There is NO mDNS package dependency.
  #
  # WHY in-house, not a package: the prior choice `bonsoir` is GPL-3.0, which is
  # incompatible with a closed-source commercial App Store app (PRD Decision Log
  # 13), so it was removed. NWBrowser drives the OS Bonjour daemon, so the browse
  # works with only NSBonjourServices declared in Info.plist and NO
  # com.apple.developer.networking.multicast entitlement — the App-Store-safe
  # path (pure-Dart multicast_dns needs that entitlement and returns empty on
  # iOS without it). Android NsdManager is deferred per
  # project-toolbox-platform-scope; the Dart factory returns a clean empty
  # discovery on non-iOS/macOS targets.

dev_dependencies:
  flutter_test:
    sdk: flutter

  # plugin_platform_interface — used ONLY in tests (MockPlatformInterfaceMixin)
  # to mock GeolocatorPlatform.instance so the DeviceLocation IP-approximate
  # fallback can be exercised without real GPS hardware. Already present
  # transitively via geolocator; declared here so the test import is a direct
  # dependency (satisfies depend_on_referenced_packages).
  plugin_platform_interface: ^2.1.8

  # integration_test — drives widget tests against the REAL platform embedder
  # (here: macOS, via `flutter test -d macos`) so native PDFKit is available.
  # The 10 bundled reference-card PDFs render through pdfx → Apple PDFKit, which
  # is a no-op in the headless flutter_test environment; this package is the
  # only way to prove they decode and paint on-device. See
  # integration_test/pdf_render_test.dart.
  integration_test:
    sdk: flutter

  # The "flutter_lints" package below contains a set of recommended lints to
  # encourage good coding practices. The lint set provided by the package is
  # activated in the `analysis_options.yaml` file located at the root of your
  # package. See that file for information about deactivating specific lint
  # rules and activating additional ones.
  flutter_lints: ^6.0.0

  # flutter_launcher_icons — generates the iOS + macOS + Android launcher icon
  # sets from the single brand master at assets/branding/app-icon-1024.png
  # (the approved R9 toolbox + Wi-Fi mark, GL-003 §2/§5). Run via:
  #   dart run flutter_launcher_icons
  flutter_launcher_icons: ^0.14.4

# flutter_launcher_icons configuration. Master is the opaque 1024 brand mark.
# iOS + macOS get the full opaque set (App Store requires no alpha). Android
# gets both legacy mipmaps and an adaptive icon (charcoal background + the mark
# as the foreground, inset into the adaptive safe zone by the generator).
flutter_launcher_icons:
  image_path: "assets/branding/app-icon-1024.png"
  ios: true
  remove_alpha_ios: true
  macos:
    generate: true
    image_path: "assets/branding/app-icon-1024.png"
  android: true
  adaptive_icon_background: "#1A1A1A"
  adaptive_icon_foreground: "assets/branding/app-icon-1024.png"

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  # IBM Plex Sans + DM Mono + Roboto Mono ship as bundled Flutter font
  # families (see the `fonts:` block below) so typography renders fully
  # offline / on first launch with zero runtime fetch. The theme asks for
  # these plain family names via `fontFamily` (lib/theme/), not via
  # google_fonts runtime resolution. Required because the default macOS
  # Flutter entitlements do not include com.apple.security.network.client;
  # bundling the families avoids any dependency on network access just to
  # render type.
  #
  # The same TTFs are ALSO listed under `assets:` below so the golden-test
  # FontLoader (test/flutter_test_config.dart) can rootBundle.load them by
  # path. Listing a TTF as both an asset and a font face is harmless.
  assets:
    - assets/fonts/IBMPlexSans-Regular.ttf
    - assets/fonts/IBMPlexSans-Medium.ttf
    - assets/fonts/IBMPlexSans-SemiBold.ttf
    - assets/fonts/IBMPlexSans-Bold.ttf
    - assets/fonts/DMMono-Regular.ttf
    - assets/fonts/DMMono-Medium.ttf
    # Roboto Mono — monospaced sans-serif for fixed-width identifiers (IP, MAC,
    # subnet masks, BSSIDs, hex). Declared as a font family below; also listed
    # here as an asset for the golden-test FontLoader.
    - assets/fonts/RobotoMono-Regular.ttf
    # Bundled IEEE OUI / vendor table for the MAC Vendor Lookup tool
    # (TICKET-002). Trimmed MA-L/MA-M/MA-S registries; loaded + parsed once and
    # cached. Source + retrieval date documented in the asset header.
    - assets/oui/oui_table.tsv
    # Curated well-known/registered TCP/UDP port reference for the Well-Known
    # Ports tool (TICKET-007). A field-relevant subset of the IANA registry,
    # loaded + indexed once at startup. Source noted in the asset's _meta block.
    - assets/ports/well_known_ports.json
    # Wi-Fi Glossary — 92 plain-language Wi-Fi term definitions across 8
    # categories, for the Wi-Fi Glossary Quick Reference tool. Bundled JSON,
    # loaded + parsed once at screen open; curation order (categories and terms
    # within each) is deliberate and preserved. Source noted in the file's
    # top-level `source` field.
    - assets/data/glossary.json
    # Wi-Fi Authentication Glossary — 58 plain-language Wi-Fi authentication
    # term definitions across 7 categories, for the Wi-Fi Authentication
    # Glossary Quick Reference tool. Sibling of glossary.json; same schema,
    # loaded by the same WifiGlossaryScreen + GlossaryService. Curation order
    # (categories and terms within each) is deliberate and preserved.
    - assets/data/wifi_auth_glossary.json
    # In-app tool help — one entry per catalog tool id, keyed for helpForId()
    # (lib/services/help/). Generated from FIELD-MANUAL.md; loaded + parsed once
    # at startup and cached for the process lifetime. Drives the per-tool help
    # sheet and the Help & Documentation browse screen. Honesty (GL-005): a tool
    # with no entry shows no help affordance; nothing is fabricated.
    - assets/help/tool_help.json
    # Educational Resources directory — the 52-entry combined dataset (curated
    # tools/vendor-docs + the wlan-talks learning destinations) for the
    # Educational Resources category. Loaded + parsed once when the directory
    # screen opens, fully offline. Schema + attribution in the asset's _meta
    # block; the destinations credit is scoped per _meta.attribution_scope.
    - assets/data/educational_resources.json
    # Per-tool Tier-2 custom icons (GL-003 §8.6 / §8.6.1) and in-tool concept
    # graphics (GL-003 §8.6.2). Convention-based lookup by catalog id:
    #   icon    = assets/tool-icons/<tool-id>.svg
    #   graphic = assets/tool-graphics/<tool-id>.svg
    # Most files do not exist yet — the resolver degrades gracefully against the
    # asset manifest (lib/data/tool_assets.dart), so a missing file never throws
    # and never shows a broken-image box. Directory entries pull every file in
    # the folder, so dropping a new <id>.svg in needs no pubspec change.
    - assets/tool-icons/
    - assets/tool-graphics/
    # PDF reference cards — Keith's 10 laminated reference cards (Excel→PDF
    # exports), one bundled PDF per "PDF reference card" tool, named by catalog
    # id: assets/reference-cards/<tool-id>.pdf. Rendered offline in a
    # pinch-zoomable PdfViewPinch (lib/screens/tools/reference/
    # pdf_reference_screen.dart) via pdfx → Apple PDFKit on iOS + macOS.
    - assets/reference-cards/

  # Original commented-out scaffold examples removed for clarity.

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/to/asset-from-package

  # Bundled font families. The theme (lib/theme/app_typography.dart)
  # references these plain family names via `fontFamily`; the engine selects
  # the correct face by weight at render
  # time. No runtime fetch, fully offline. Weight mapping mirrors the
  # GL-003 §3 type scale exactly (behavior-preserving migration off
  # google_fonts, 2026-06-01).
  fonts:
    - family: IBM Plex Sans
      fonts:
        - asset: assets/fonts/IBMPlexSans-Regular.ttf
          weight: 400
        - asset: assets/fonts/IBMPlexSans-Medium.ttf
          weight: 500
        - asset: assets/fonts/IBMPlexSans-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/IBMPlexSans-Bold.ttf
          weight: 700
    - family: DM Mono
      fonts:
        - asset: assets/fonts/DMMono-Regular.ttf
          weight: 400
        - asset: assets/fonts/DMMono-Medium.ttf
          weight: 500
    - family: Roboto Mono
      fonts:
        - asset: assets/fonts/RobotoMono-Regular.ttf
          weight: 400
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package
