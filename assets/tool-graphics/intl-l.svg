<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 560" width="640" height="560" font-family="IBM Plex Sans, sans-serif" fill="none">
  <!-- Type L (Italy, CEI 23-50) FACE. CONTRAST REWORK 2026-06-08 (Charta gfx2-intl).
       POP pass: subtitle, L/E/N callouts, spec line promoted #9C9C9C -> #E5E5E5; frame stroke 3 -> 4;
       center earth pin promoted to bright #E5E5E5 geometry. #9C9C9C kept ONLY for tertiary footnotes.
       Palette §8.20.7 only; NO lime. Pin geometry UNCHANGED (Vera-passed).
       STANDING RULE: no label over any outline/pin/label. -->

  <rect x="0" y="0" width="640" height="560" fill="#1A1A1A"/>

  <!-- Header -->
  <text x="320" y="46" fill="#E5E5E5" font-size="30" font-weight="600" text-anchor="middle">Italy</text>
  <text x="320" y="76" fill="#E5E5E5" font-size="16" font-weight="600" text-anchor="middle">Type L &#183; three round pins inline, earth in center</text>

  <!-- FACE FRAME -->
  <rect x="204" y="134" width="232" height="232" rx="44" stroke="#E5E5E5" stroke-width="4"/>

  <!-- PINS: three inline, earth center -->
  <circle cx="255" cy="250" r="18" fill="#E5E5E5"/>   <!-- L, left -->
  <circle cx="320" cy="250" r="18" fill="#E5E5E5"/>   <!-- E, center -->
  <circle cx="385" cy="250" r="18" fill="#E5E5E5"/>   <!-- N, right -->

  <!-- pin callouts -->
  <text x="255" y="304" fill="#E5E5E5" font-size="16" font-weight="700" text-anchor="middle" font-family="DM Mono, monospace">L</text>
  <text x="320" y="304" fill="#E5E5E5" font-size="16" font-weight="700" text-anchor="middle" font-family="DM Mono, monospace">E</text>
  <text x="385" y="304" fill="#E5E5E5" font-size="16" font-weight="700" text-anchor="middle" font-family="DM Mono, monospace">N</text>

  <!-- LABELS -->
  <text x="320" y="436" fill="#E5E5E5" font-size="34" font-weight="600" text-anchor="middle" font-family="DM Mono, monospace">Type L</text>
  <text x="320" y="468" fill="#E5E5E5" font-size="18" font-weight="600" text-anchor="middle" font-family="DM Mono, monospace">CEI 23-50 &#183; 230 V &#183; 10 / 16 A</text>
  <text x="320" y="498" fill="#9C9C9C" font-size="16" font-weight="500" text-anchor="middle">Italy, Chile</text>
  <text x="320" y="524" fill="#9C9C9C" font-size="15" font-weight="500" text-anchor="middle">High-voltage class (220&#8211;240 V)</text>
</svg>
