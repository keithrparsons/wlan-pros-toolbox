<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 160" fill="none" font-family="IBM Plex Sans, sans-serif">
  <!-- RF attenuation: a signal passing through building material (walls), losing dB per wall.
       Lime = the dB lost through the material. -->

  <!-- Source AP (left) -->
  <g stroke="#E5E5E5" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
    <line x1="28" y1="52" x2="28" y2="104"/>
    <path d="M28 52 L19 41 M28 52 L37 41"/>
    <line x1="18" y1="104" x2="38" y2="104"/>
  </g>
  <text x="28" y="120" fill="#9C9C9C" font-size="11" font-weight="500" text-anchor="middle">source</text>

  <!-- Signal arcs at full strength before the first wall (neutral) -->
  <g stroke="#E5E5E5" stroke-width="2" stroke-linecap="round" fill="none">
    <path d="M46 64 A14 16 0 0 1 46 88" opacity="0.95"/>
    <path d="M58 60 A18 22 0 0 1 58 92" opacity="0.8"/>
  </g>

  <!-- Wall 1 (building material slab, neutral) -->
  <rect x="96" y="40" width="14" height="72" stroke="#E5E5E5" stroke-width="1.75"/>
  <g stroke="#9C9C9C" stroke-width="1" stroke-linecap="round">
    <line x1="96" y1="52" x2="110" y2="46"/>
    <line x1="96" y1="68" x2="110" y2="62"/>
    <line x1="96" y1="84" x2="110" y2="78"/>
    <line x1="96" y1="100" x2="110" y2="94"/>
  </g>
  <!-- Wall 2 -->
  <rect x="186" y="40" width="14" height="72" stroke="#E5E5E5" stroke-width="1.75"/>
  <g stroke="#9C9C9C" stroke-width="1" stroke-linecap="round">
    <line x1="186" y1="52" x2="200" y2="46"/>
    <line x1="186" y1="68" x2="200" y2="62"/>
    <line x1="186" y1="84" x2="200" y2="78"/>
    <line x1="186" y1="100" x2="200" y2="94"/>
  </g>

  <!-- Straight signal ray crossing the walls, weakening (lime = the loss) -->
  <line x1="60" y1="76" x2="96" y2="76" stroke="#A2CC3A" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="110" y1="76" x2="186" y2="76" stroke="#A2CC3A" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <line x1="200" y1="76" x2="290" y2="76" stroke="#A2CC3A" stroke-width="1.5" stroke-linecap="round" opacity="0.32"/>
  <!-- arrow head at receiving end -->
  <path d="M284 72 L290 76 L284 80" stroke="#A2CC3A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.32"/>

  <!-- per-wall loss markers (lime) -->
  <g stroke="#A2CC3A" stroke-width="1.5" stroke-linecap="round">
    <path d="M100 30 L106 24 M118 30 L112 24" />
  </g>
  <text x="103" y="22" fill="#A2CC3A" font-size="12" font-weight="500" text-anchor="middle">&#8722;dB</text>
  <text x="193" y="22" fill="#A2CC3A" font-size="12" font-weight="500" text-anchor="middle">&#8722;dB</text>

  <!-- Header / footer -->
  <text x="160" y="138" fill="#9C9C9C" font-size="12" font-weight="500" text-anchor="middle">loss per wall by material type</text>
  <text x="160" y="154" fill="#E5E5E5" font-size="13" font-weight="500" text-anchor="middle" font-family="DM Mono, monospace">atten = &#931; dB per material</text>
</svg>
