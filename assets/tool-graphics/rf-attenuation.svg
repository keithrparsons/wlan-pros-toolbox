<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 160" fill="none" font-family="IBM Plex Sans, sans-serif">
  <!-- RF attenuation: a signal passing through two building-material walls, losing dB
       at each. Walls are clearly-drawn, LABELED rectangles with DM Mono loss values.
       No hatching. Source is the schematic aerial symbol. Lime = the dB lost.

       SOURCE OF TRUTH: RfAttenuationScreen.materials
       (lib/screens/tools/calculators/rf_attenuation_screen.dart). Both walls are
       named EXACTLY as that table names them, and both values are the table's
       2.4 GHz column (loss24), which is why the band is now stated in the header:
         'Drywall / Plasterboard' -> 3 dB @ 2.4 GHz
         'Concrete block / CMU'   -> 10 dB @ 2.4 GHz
       DO NOT hand-edit a number here. Edit the screen and re-derive.

       WHAT THIS FIXES (2026-07-14): the previous drawing labelled a wall
       "concrete" and put -12 dB on it. The screen has NO material called plain
       "concrete" -- it has three (CMU 10/13/15, poured 13/16/19, floor/ceiling
       15/20/22) -- and 12 appears in NONE of them at any band. 12 is the BRICK
       value at 5 GHz. The drawing also never said which band its numbers were
       for, which is what let the mismatch hide. -->

  <!-- Header -->
  <text x="160" y="18" fill="#E5E5E5" font-size="13" font-weight="500" text-anchor="middle">loss per wall by material (2.4 GHz)</text>

  <!-- Source antenna (left) — schematic aerial symbol (mast + base + 3 splayed rays) -->
  <g stroke="#E5E5E5" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <line x1="26" y1="56" x2="26" y2="104"/>
    <line x1="20" y1="104" x2="32" y2="104"/>
    <path d="M26 56 L18 48 M26 56 V44 M26 56 L34 48"/>
  </g>
  <text x="26" y="120" fill="#9C9C9C" font-size="11" font-weight="500" text-anchor="middle">source</text>

  <!-- Signal arcs at full strength leaving the source (neutral, radiating outward) -->
  <g stroke="#E5E5E5" stroke-width="1.75" stroke-linecap="round" fill="none">
    <path d="M40 66 A14 16 0 0 1 40 90" opacity="0.95"/>
    <path d="M50 62 A18 22 0 0 1 50 94" opacity="0.7"/>
  </g>

  <!-- Wall 1: a real labeled wall section (drywall) -->
  <rect x="104" y="42" width="16" height="72" rx="1.5" stroke="#E5E5E5" stroke-width="1.75" fill="none"/>
  <text x="112" y="128" fill="#9C9C9C" font-size="11" font-weight="500" text-anchor="middle">drywall</text>
  <text x="112" y="36" fill="#A2CC3A" font-size="12" font-weight="500" text-anchor="middle" font-family="DM Mono, monospace">&#8722;3 dB</text>

  <!-- Wall 2: 'Concrete block / CMU' = 10 dB at 2.4 GHz (RfAttenuationScreen.materials) -->
  <rect x="198" y="42" width="16" height="72" rx="1.5" stroke="#E5E5E5" stroke-width="1.75" fill="none"/>
  <text x="206" y="128" fill="#9C9C9C" font-size="11" font-weight="500" text-anchor="middle">concrete block</text>
  <text x="206" y="36" fill="#A2CC3A" font-size="12" font-weight="500" text-anchor="middle" font-family="DM Mono, monospace">&#8722;10 dB</text>

  <!-- Straight signal ray crossing the walls, weakening segment by segment (lime = the loss) -->
  <line x1="62" y1="78" x2="104" y2="78" stroke="#A2CC3A" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="120" y1="78" x2="198" y2="78" stroke="#A2CC3A" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <line x1="214" y1="78" x2="298" y2="78" stroke="#A2CC3A" stroke-width="1.5" stroke-linecap="round" opacity="0.32"/>
  <path d="M292 74 L298 78 L292 82" stroke="#A2CC3A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.32"/>

  <!-- Footer formula. Capital sigma as a vector <path> (was &#931; in DM Mono,
       which carries no Greek -> tofu): top bar, diagonal to center, diagonal to
       bottom-left, bottom bar. ASCII runs are start-anchored monospace with sigma
       in the fixed gap (GL-003 8.6.1). -->
  <text x="62.4" y="152" fill="#E5E5E5" font-size="13" font-weight="500" text-anchor="start" font-family="DM Mono, monospace">atten = </text>
  <path d="M124.8 142.5 H132 M132 142.5 L127.4 147.2 L124.8 151.8 M124.8 151.8 H132.4" fill="none" stroke="#E5E5E5" stroke-width="1.45" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="132.8" y="152" fill="#E5E5E5" font-size="13" font-weight="500" text-anchor="start" font-family="DM Mono, monospace"> dB per material</text>
</svg>
