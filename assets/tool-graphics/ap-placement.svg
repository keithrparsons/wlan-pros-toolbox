<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 160" fill="none" font-family="IBM Plex Sans, sans-serif">
  <!-- AP placement: two ceiling-mounted APs with overlapping coverage cells across a
       floor plan + a spacing dimension. Lime = the cell-overlap zone. -->

  <!-- Header -->
  <text x="160" y="20" fill="#E5E5E5" font-size="13" font-weight="500" text-anchor="middle" font-family="DM Mono, monospace">AP spacing &amp; cell overlap</text>

  <!-- Ceiling line -->
  <line x1="24" y1="38" x2="296" y2="38" stroke="#9C9C9C" stroke-width="1.25" stroke-dasharray="4 4"/>

  <!-- Ceiling-mounted AP 1 (puck flush under the ceiling) -->
  <g stroke="#E5E5E5" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
    <rect x="88" y="38" width="24" height="9" rx="3"/>
    <line x1="100" y1="47" x2="100" y2="52"/>
  </g>
  <!-- AP 1 coverage cell (neutral) -->
  <path d="M58 100 A48 50 0 0 1 142 100" stroke="#E5E5E5" stroke-width="1.75" stroke-linecap="round" fill="none"/>

  <!-- Ceiling-mounted AP 2 -->
  <g stroke="#E5E5E5" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
    <rect x="208" y="38" width="24" height="9" rx="3"/>
    <line x1="220" y1="47" x2="220" y2="52"/>
  </g>
  <!-- AP 2 coverage cell (neutral) -->
  <path d="M178 100 A48 50 0 0 1 262 100" stroke="#E5E5E5" stroke-width="1.75" stroke-linecap="round" fill="none"/>

  <!-- Floor line -->
  <line x1="24" y1="100" x2="296" y2="100" stroke="#E5E5E5" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Overlap zone (lime = the measured cell-overlap) -->
  <path d="M142 100 A48 50 0 0 1 158 70 A48 50 0 0 1 178 100 Z" fill="#A2CC3A" fill-opacity="0.08"/>
  <path d="M142 100 A48 50 0 0 1 160 67" stroke="#A2CC3A" stroke-width="2" stroke-linecap="round" fill="none"/>
  <path d="M178 100 A48 50 0 0 0 160 67" stroke="#A2CC3A" stroke-width="2" stroke-linecap="round" fill="none"/>
  <text x="160" y="118" fill="#A2CC3A" font-size="12" font-weight="500" text-anchor="middle">overlap</text>

  <!-- Spacing dimension between the two APs -->
  <g stroke="#9C9C9C" stroke-width="1.25" stroke-linecap="round">
    <line x1="100" y1="134" x2="220" y2="134"/>
    <path d="M100 130 L100 138 M220 130 L220 138"/>
    <path d="M106 131 L100 134 L106 137 M214 131 L220 134 L214 137"/>
  </g>
  <text x="160" y="150" fill="#9C9C9C" font-size="12" font-weight="500" text-anchor="middle">AP spacing</text>

  <!-- AP labels -->
  <text x="100" y="32" fill="#9C9C9C" font-size="11" font-weight="500" text-anchor="middle">AP 1</text>
  <text x="220" y="32" fill="#9C9C9C" font-size="11" font-weight="500" text-anchor="middle">AP 2</text>
</svg>
