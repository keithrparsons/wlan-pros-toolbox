<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 160" fill="none" font-family="IBM Plex Sans, sans-serif">
  <!-- AP placement. Redrawn to §8.6.2.1: testers said "I don't understand it — what's
       the humpy thing?" The humpy thing was two coverage arcs reading as one blob.
       Now it reads literally: TWO ceiling-mounted generic APs (rounded body + two
       dipoles), each casting a coverage CELL (a clearly separate dome) toward the
       floor; the two cells OVERLAP in a labeled zone at the cell edge. The AP
       spacing is dimensioned below. Lime = the measured overlap zone (the thing the
       planner cares about). Every part labeled. -->

  <!-- Header -->
  <text x="160" y="15" fill="#E5E5E5" font-size="12" font-weight="500" text-anchor="middle">Space APs so their coverage cells overlap</text>

  <!-- Ceiling line (where APs mount) -->
  <line x1="20" y1="30" x2="300" y2="30" stroke="#9C9C9C" stroke-width="1.25" stroke-dasharray="4 4"/>
  <text x="300" y="27" fill="#9C9C9C" font-size="8" text-anchor="end">ceiling</text>

  <!-- ============================================================= -->
  <!-- Generic AP, ceiling-mounted (rounded body + two short dipoles) -->
  <!-- ============================================================= -->
  <defs>
    <g id="ceil-ap">
      <!-- body flush under the ceiling -->
      <rect x="-15" y="0" width="30" height="11" rx="3" stroke="#E5E5E5" stroke-width="1.75"/>
      <!-- two short dipoles hanging down from the body (ceiling AP points down) -->
      <g stroke="#E5E5E5" stroke-width="1.75" stroke-linecap="round">
        <line x1="-7" y1="11" x2="-7" y2="18"/>
        <line x1="7"  y1="11" x2="7"  y2="18"/>
      </g>
      <circle cx="-7" cy="19" r="1.4" fill="#E5E5E5"/>
      <circle cx="7"  cy="19" r="1.4" fill="#E5E5E5"/>
    </g>
  </defs>

  <use href="#ceil-ap" transform="translate(90,30)"/>
  <use href="#ceil-ap" transform="translate(230,30)"/>
  <text x="120" y="40" fill="#9C9C9C" font-size="9" text-anchor="start">AP 1</text>
  <text x="260" y="40" fill="#9C9C9C" font-size="9" text-anchor="start">AP 2</text>

  <!-- ============================================================= -->
  <!-- Coverage cells: each AP casts a dome toward the floor.        -->
  <!-- Cell 1 centered at x=90, cell 2 at x=230, radius 90 -> they   -->
  <!-- meet/overlap around x=160 (140 spacing < 180 = overlap).      -->
  <!-- ============================================================= -->

  <!-- floor line -->
  <line x1="20" y1="116" x2="300" y2="116" stroke="#E5E5E5" stroke-width="1.5" stroke-linecap="round"/>
  <text x="20" y="127" fill="#9C9C9C" font-size="8">floor</text>

  <!-- Cell 1 dome (neutral) -->
  <path d="M22 116 A68 86 0 0 1 158 116" stroke="#E5E5E5" stroke-width="1.75" fill="none"/>
  <!-- Cell 2 dome (neutral) -->
  <path d="M162 116 A68 86 0 0 1 298 116" stroke="#E5E5E5" stroke-width="1.75" fill="none"/>

  <!-- cell labels -->
  <text x="62"  y="100" fill="#9C9C9C" font-size="9" text-anchor="middle">cell 1</text>
  <text x="258" y="100" fill="#9C9C9C" font-size="9" text-anchor="middle">cell 2</text>

  <!-- ============================================================= -->
  <!-- OVERLAP ZONE (lime) — the lens where the two cells cross,      -->
  <!-- with a low-opacity lime wash so it reads as the measured region -->
  <!-- ============================================================= -->
  <!-- lime wash lens between the two domes near x=160 -->
  <path d="M158 116 A68 86 0 0 1 160 64 A68 86 0 0 1 162 116 Z" fill="#A2CC3A" fill-opacity="0.10"/>
  <!-- the two crossing edges of the lens, drawn lime -->
  <path d="M158 116 A68 86 0 0 1 160 64" stroke="#A2CC3A" stroke-width="2" fill="none"/>
  <path d="M162 116 A68 86 0 0 0 160 64" stroke="#A2CC3A" stroke-width="2" fill="none"/>
  <!-- callout leader from the lens to a label clear of the geometry -->
  <line x1="160" y1="92" x2="160" y2="74" stroke="#A2CC3A" stroke-width="1"/>
  <text x="160" y="106" fill="#A2CC3A" font-size="9.5" font-weight="500" text-anchor="middle">overlap zone</text>

  <!-- ============================================================= -->
  <!-- AP spacing dimension between the two AP centers -->
  <!-- ============================================================= -->
  <g stroke="#9C9C9C" stroke-width="1.25" stroke-linecap="round">
    <line x1="90" y1="138" x2="230" y2="138"/>
    <path d="M90 134 L90 142 M230 134 L230 142"/>
    <path d="M96 135 L90 138 L96 141 M224 135 L230 138 L224 141"/>
  </g>
  <text x="160" y="153" fill="#9C9C9C" font-size="10" font-weight="500" text-anchor="middle">AP spacing (drives the overlap)</text>
</svg>
