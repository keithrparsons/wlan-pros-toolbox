<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none" font-family="IBM Plex Sans, sans-serif">
  <!-- Downtilt coverage: mast with beam edges hitting the ground as inner/outer coverage radii.
       Lime = the coverage ring (the band between the near and far edges). -->

  <!-- Ground line -->
  <line x1="16" y1="160" x2="190" y2="160" stroke="#E5E5E5" stroke-width="1.75" stroke-linecap="round"/>
  <g stroke="#9C9C9C" stroke-width="1" stroke-linecap="round" opacity="0.7">
    <path d="M24 160 l5 6 M40 160 l5 6 M170 160 l5 6 M186 160 l5 6"/>
  </g>

  <!-- Mast at left -->
  <line x1="40" y1="36" x2="40" y2="160" stroke="#E5E5E5" stroke-width="1.75" stroke-linecap="round"/>
  <rect x="34" y="32" width="12" height="20" rx="2" stroke="#E5E5E5" stroke-width="1.75"/>

  <!-- Two beam edges (vertical beamwidth) from the antenna, neutral -->
  <!-- upper edge hits the far ground point, lower edge hits the near ground point -->
  <line x1="40" y1="42" x2="170" y2="160" stroke="#E5E5E5" stroke-width="1.75" stroke-linecap="round"/>
  <line x1="40" y1="42" x2="86" y2="160" stroke="#E5E5E5" stroke-width="1.75" stroke-linecap="round"/>

  <!-- low-opacity lime wash filling the beam wedge -->
  <path d="M40 42 L86 160 L170 160 Z" fill="#A2CC3A" fill-opacity="0.08"/>

  <!-- Beamwidth arc at the antenna between the two edges -->
  <path d="M58 58 A24 24 0 0 1 50 66" stroke="#9C9C9C" stroke-width="1.5" fill="none"/>

  <!-- Coverage ring on the ground (lime): near edge -> far edge -->
  <line x1="86" y1="160" x2="170" y2="160" stroke="#A2CC3A" stroke-width="3" stroke-linecap="round"/>
  <circle cx="86" cy="160" r="3" fill="#A2CC3A"/>
  <circle cx="170" cy="160" r="3" fill="#A2CC3A"/>

  <!-- near / far radius dimension callouts -->
  <g stroke="#9C9C9C" stroke-width="1.25" stroke-linecap="round">
    <line x1="40" y1="176" x2="86" y2="176"/>
    <path d="M46 173 L40 176 L46 179 M80 173 L86 176 L80 179"/>
    <line x1="86" y1="188" x2="170" y2="188"/>
    <path d="M92 185 L86 188 L92 191 M164 185 L170 188 L164 191"/>
  </g>
  <text x="63" y="174" fill="#9C9C9C" font-size="10" font-weight="500" text-anchor="middle">near</text>
  <text x="128" y="186" fill="#9C9C9C" font-size="10" font-weight="500" text-anchor="middle">far</text>

  <!-- coverage label on the ring -->
  <text x="128" y="152" fill="#A2CC3A" font-size="12" font-weight="500" text-anchor="middle">coverage</text>

  <!-- Header -->
  <text x="100" y="22" fill="#E5E5E5" font-size="12" font-weight="500" text-anchor="middle">tilt + beamwidth &#8594; coverage</text>
</svg>
