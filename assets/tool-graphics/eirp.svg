<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none" font-family="IBM Plex Sans, sans-serif">
  <!-- EIRP: Tx power -> minus cable loss -> plus antenna gain -> radiated lobe. Lime = the radiated EIRP. -->

  <!-- Radio (Tx source) bottom-left -->
  <rect x="26" y="150" width="34" height="26" rx="3" stroke="#E5E5E5" stroke-width="1.75"/>
  <line x1="34" y1="158" x2="52" y2="158" stroke="#9C9C9C" stroke-width="1.25" stroke-linecap="round"/>
  <line x1="34" y1="164" x2="52" y2="164" stroke="#9C9C9C" stroke-width="1.25" stroke-linecap="round"/>
  <text x="43" y="192" fill="#9C9C9C" font-size="11" font-weight="500" text-anchor="middle">Tx</text>

  <!-- Coax run up the mast: cable loss along it (neutral) -->
  <path d="M43 150 L43 96 L96 96" stroke="#E5E5E5" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="22" y="124" fill="#9C9C9C" font-size="11" font-weight="500" text-anchor="middle" transform="rotate(-90 22 124)" font-family="DM Mono, monospace">&#8722; cable</text>

  <!-- Antenna element at the feed point (gain added here) -->
  <g stroke="#E5E5E5" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
    <line x1="96" y1="78" x2="96" y2="114"/>
    <path d="M96 78 L88 68 M96 78 L104 68"/>
  </g>
  <text x="96" y="130" fill="#9C9C9C" font-size="11" font-weight="500" text-anchor="middle" font-family="DM Mono, monospace">+ gain</text>

  <!-- Radiated lobe (lime = EIRP), expanding arcs to the upper-right -->
  <g stroke="#A2CC3A" stroke-width="2" stroke-linecap="round" fill="none">
    <path d="M110 70 A26 26 0 0 1 110 22" opacity="0.95"/>
    <path d="M124 78 A40 40 0 0 1 124 14" opacity="0.6"/>
    <path d="M138 86 A54 54 0 0 1 138 8" opacity="0.32"/>
  </g>
  <!-- low-opacity lime wash on the lobe -->
  <path d="M96 78 L150 30 A60 60 0 0 0 96 18 Z" fill="#A2CC3A" fill-opacity="0.08"/>

  <!-- EIRP label on the lobe -->
  <text x="150" y="60" fill="#A2CC3A" font-size="13" font-weight="500" text-anchor="middle">EIRP</text>

  <!-- Formula header -->
  <text x="100" y="16" fill="#E5E5E5" font-size="12" font-weight="500" text-anchor="middle" font-family="DM Mono, monospace">Tx &#8722; loss + gain</text>
</svg>
