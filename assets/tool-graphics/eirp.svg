<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 160" fill="none" font-family="IBM Plex Sans, sans-serif">
  <!-- EIRP: Tx power -> minus cable loss up the mast -> plus antenna gain -> radiated lobe.
       Lime = the radiated EIRP. Re-laid-out left-to-right for the 2:1 wide band. -->

  <!-- Radio (Tx source) bottom-left -->
  <rect x="22" y="108" width="38" height="28" rx="3" stroke="#E5E5E5" stroke-width="1.75"/>
  <line x1="30" y1="117" x2="52" y2="117" stroke="#9C9C9C" stroke-width="1.25" stroke-linecap="round"/>
  <line x1="30" y1="123" x2="52" y2="123" stroke="#9C9C9C" stroke-width="1.25" stroke-linecap="round"/>
  <text x="41" y="151" fill="#9C9C9C" font-size="12" font-weight="500" text-anchor="middle">Tx</text>

  <!-- Coax run up the mast then across to the feed point (neutral): cable loss along it -->
  <path d="M41 108 L41 64 L96 64" stroke="#E5E5E5" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="24" y="86" fill="#9C9C9C" font-size="12" font-weight="500" text-anchor="middle" transform="rotate(-90 24 86)" font-family="DM Mono, monospace">&#8722; loss</text>

  <!-- Antenna element at the feed point (gain added here) — schematic aerial symbol -->
  <g stroke="#E5E5E5" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <line x1="96" y1="48" x2="96" y2="88"/>
    <line x1="90" y1="88" x2="102" y2="88"/>
    <path d="M96 48 L88 40 M96 48 V36 M96 48 L104 40"/>
  </g>
  <text x="96" y="104" fill="#9C9C9C" font-size="12" font-weight="500" text-anchor="middle" font-family="DM Mono, monospace">+ gain</text>

  <!-- Radiated lobe (lime = EIRP), expanding arcs to the right -->
  <g stroke="#A2CC3A" stroke-width="2" stroke-linecap="round" fill="none">
    <path d="M118 46 A26 26 0 0 1 118 98" opacity="0.95"/>
    <path d="M148 40 A40 40 0 0 1 148 104" opacity="0.6"/>
    <path d="M180 34 A54 54 0 0 1 180 110" opacity="0.32"/>
  </g>
  <!-- low-opacity lime wash on the lobe -->
  <path d="M96 72 L196 36 A60 60 0 0 1 196 108 Z" fill="#A2CC3A" fill-opacity="0.08"/>

  <!-- EIRP label on the lobe -->
  <text x="170" y="76" fill="#A2CC3A" font-size="14" font-weight="500" text-anchor="middle">EIRP</text>
  <text x="244" y="76" fill="#A2CC3A" font-size="12" font-weight="500" text-anchor="middle">radiated &#8594;</text>

  <!-- Formula header -->
  <text x="160" y="20" fill="#E5E5E5" font-size="13" font-weight="500" text-anchor="middle" font-family="DM Mono, monospace">EIRP = Tx &#8722; loss + gain</text>
</svg>
