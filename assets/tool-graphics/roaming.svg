<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 160" fill="none" font-family="IBM Plex Sans, sans-serif">
  <!-- Roaming: a client moving between two AP cells, handoff at the RSSI threshold.
       Lime = the roam trigger (the handoff). 802.11r/k/v. -->

  <!-- Header -->
  <text x="160" y="20" fill="#E5E5E5" font-size="13" font-weight="500" text-anchor="middle" font-family="DM Mono, monospace">802.11r / k / v handoff</text>

  <!-- Ceiling-mounted AP, left (puck under a ceiling line) -->
  <g stroke="#E5E5E5" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
    <line x1="40" y1="40" x2="100" y2="40"/>
    <rect x="58" y="40" width="24" height="9" rx="3"/>
  </g>
  <!-- AP1 coverage cell (neutral arcs fanning down) -->
  <g stroke="#E5E5E5" stroke-width="1.5" stroke-linecap="round" fill="none">
    <path d="M48 58 A28 24 0 0 1 92 58" opacity="0.55"/>
    <path d="M56 64 A18 16 0 0 1 84 64" opacity="0.8"/>
  </g>
  <text x="70" y="34" fill="#9C9C9C" font-size="11" font-weight="500" text-anchor="middle">AP 1</text>

  <!-- Ceiling-mounted AP, right -->
  <g stroke="#E5E5E5" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
    <line x1="220" y1="40" x2="280" y2="40"/>
    <rect x="238" y="40" width="24" height="9" rx="3"/>
  </g>
  <!-- AP2 coverage cell -->
  <g stroke="#E5E5E5" stroke-width="1.5" stroke-linecap="round" fill="none">
    <path d="M228 58 A28 24 0 0 1 272 58" opacity="0.55"/>
    <path d="M236 64 A18 16 0 0 1 264 64" opacity="0.8"/>
  </g>
  <text x="250" y="34" fill="#9C9C9C" font-size="11" font-weight="500" text-anchor="middle">AP 2</text>

  <!-- Two coverage ellipses on the floor, overlapping in the middle -->
  <ellipse cx="92" cy="112" rx="74" ry="20" stroke="#9C9C9C" stroke-width="1.25"/>
  <ellipse cx="228" cy="112" rx="74" ry="20" stroke="#9C9C9C" stroke-width="1.25"/>

  <!-- Overlap zone: the handoff region (lime wash + lime threshold marker) -->
  <line x1="160" y1="92" x2="160" y2="132" stroke="#A2CC3A" stroke-width="1.5" stroke-dasharray="4 4" stroke-linecap="round"/>

  <!-- Client roaming path: from AP1 cell into AP2 cell (lime = the roam trigger) -->
  <g stroke="#A2CC3A" stroke-width="2" stroke-linecap="round" fill="none">
    <path d="M92 112 C124 112 136 112 160 112"/>
  </g>
  <!-- arrowhead toward AP2 -->
  <path d="M156 108 L162 112 L156 116" stroke="#A2CC3A" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- client device markers: start (neutral) and handoff (lime) -->
  <circle cx="92" cy="112" r="3" fill="#9C9C9C"/>
  <circle cx="160" cy="112" r="3.5" fill="#A2CC3A"/>

  <!-- RSSI threshold label at the overlap -->
  <text x="160" y="146" fill="#A2CC3A" font-size="12" font-weight="500" text-anchor="middle">roam @ RSSI threshold</text>
</svg>
