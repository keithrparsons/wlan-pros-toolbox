<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 160" fill="none" font-family="IBM Plex Sans, sans-serif">
  <!-- Throughput: PHY rate (full pipe) -> efficiency overhead funnel -> effective throughput (usable portion).
       Lime = the effective (usable) rate. Archetype F (flow / transform). -->

  <!-- Full PHY-rate pipe (left, neutral = the advertised data rate) -->
  <g stroke="#E5E5E5" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
    <rect x="26" y="56" width="78" height="48" rx="3"/>
  </g>
  <text x="65" y="46" fill="#9C9C9C" font-size="12" font-weight="500" text-anchor="middle">PHY rate</text>

  <!-- Efficiency funnel: pipe narrows (overhead lost = contention, headers, MAC) -->
  <g stroke="#9C9C9C" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
    <path d="M104 56 L168 70"/>
    <path d="M104 104 L168 90"/>
  </g>
  <!-- overhead lost streaks (neutral, escaping the funnel) -->
  <g stroke="#9C9C9C" stroke-width="1.25" stroke-linecap="round">
    <line x1="124" y1="58" x2="118" y2="44"/>
    <line x1="142" y1="60" x2="138" y2="46"/>
  </g>
  <text x="136" y="120" fill="#9C9C9C" font-size="11" font-weight="500" text-anchor="middle">overhead</text>

  <!-- Effective throughput gauge (right, lime = the usable portion) -->
  <rect x="168" y="70" width="86" height="20" rx="3" stroke="#E5E5E5" stroke-width="1.5"/>
  <rect x="170" y="72" width="54" height="16" rx="2" fill="#A2CC3A" opacity="0.85"/>
  <g stroke="#A2CC3A" stroke-width="1.5" stroke-linecap="round">
    <line x1="224" y1="68" x2="224" y2="92"/>
  </g>
  <text x="262" y="120" fill="#A2CC3A" font-size="12" font-weight="500" text-anchor="end">effective</text>

  <!-- Header / formula -->
  <text x="160" y="22" fill="#E5E5E5" font-size="13" font-weight="500" text-anchor="middle" font-family="DM Mono, monospace">effective = PHY &#215; efficiency</text>

  <!-- Footer cue -->
  <text x="160" y="150" fill="#9C9C9C" font-size="11" font-weight="500" text-anchor="middle">usable &lt; advertised rate</text>
</svg>
