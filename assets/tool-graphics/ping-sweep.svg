<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 160" fill="none" font-family="IBM Plex Sans, sans-serif">
  <!-- Ping sweep: probing a whole subnet range; each host either responds (up) or not (down).
       Lime = the responsive hosts found. Archetype C/G (path across a range). -->

  <!-- Subnet range label -->
  <text x="160" y="22" fill="#E5E5E5" font-size="13" font-weight="500" text-anchor="middle" font-family="DM Mono, monospace">192.168.1.0/24</text>

  <!-- Sweeping probe arc passing over the range -->
  <path d="M30 52 Q160 34 290 52" stroke="#9C9C9C" stroke-width="1.5" stroke-linecap="round" stroke-dasharray="4 4" fill="none"/>
  <path d="M284 47 L290 52 L281 56" stroke="#9C9C9C" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <text x="160" y="46" fill="#9C9C9C" font-size="11" font-weight="500" text-anchor="middle">sweep .1 &#8594; .254</text>

  <!-- Row of host dots across the range: up = lime filled, down = neutral hollow -->
  <g>
    <!-- up hosts (lime) -->
    <circle cx="44"  cy="92" r="6" fill="#A2CC3A" fill-opacity="0.18" stroke="#A2CC3A" stroke-width="2"/>
    <circle cx="98"  cy="92" r="6" fill="#A2CC3A" fill-opacity="0.18" stroke="#A2CC3A" stroke-width="2"/>
    <circle cx="206" cy="92" r="6" fill="#A2CC3A" fill-opacity="0.18" stroke="#A2CC3A" stroke-width="2"/>
    <circle cx="276" cy="92" r="6" fill="#A2CC3A" fill-opacity="0.18" stroke="#A2CC3A" stroke-width="2"/>
    <!-- down hosts (neutral hollow) -->
    <circle cx="71"  cy="92" r="6" stroke="#9C9C9C" stroke-width="1.5"/>
    <circle cx="125" cy="92" r="6" stroke="#9C9C9C" stroke-width="1.5"/>
    <circle cx="152" cy="92" r="6" stroke="#9C9C9C" stroke-width="1.5"/>
    <circle cx="179" cy="92" r="6" stroke="#9C9C9C" stroke-width="1.5"/>
    <circle cx="233" cy="92" r="6" stroke="#9C9C9C" stroke-width="1.5"/>
    <circle cx="249" cy="92" r="6" stroke="#9C9C9C" stroke-width="1.5"/>
  </g>

  <!-- Baseline the dots sit on -->
  <line x1="34" y1="110" x2="286" y2="110" stroke="#9C9C9C" stroke-width="1" opacity="0.4" stroke-linecap="round"/>

  <!-- Legend -->
  <g font-size="12" font-weight="500">
    <circle cx="80" cy="134" r="5" fill="#A2CC3A" fill-opacity="0.18" stroke="#A2CC3A" stroke-width="2"/>
    <text x="92" y="138" fill="#A2CC3A">up</text>
    <circle cx="176" cy="134" r="5" stroke="#9C9C9C" stroke-width="1.5"/>
    <text x="188" y="138" fill="#9C9C9C">down</text>
  </g>
  <text x="160" y="154" fill="#A2CC3A" font-size="11" font-weight="500" text-anchor="middle" font-family="DM Mono, monospace">4 hosts up</text>
</svg>
