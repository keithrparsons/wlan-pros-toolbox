<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 160" fill="none" font-family="IBM Plex Sans, sans-serif">
  <!-- Earth curvature: a straight line-of-sight chord over a curved earth arc (exaggerated, not to scale).
       Lime = the bulge height at midpath. -->

  <!-- Curved earth arc (exaggerated bulge), neutral. Endpoints at the two mast bases, bulging up at midpath. -->
  <path d="M40 132 Q160 70 280 132" stroke="#E5E5E5" stroke-width="2" stroke-linecap="round" fill="none"/>
  <!-- ground hatching under the arc, sparse -->
  <g stroke="#9C9C9C" stroke-width="1" stroke-linecap="round" opacity="0.6">
    <path d="M70 118 l5 7 M120 100 l5 7 M160 94 l5 7 M200 100 l5 7 M250 118 l5 7"/>
  </g>

  <!-- Two masts standing on the curved surface -->
  <line x1="40" y1="132" x2="40" y2="52" stroke="#E5E5E5" stroke-width="1.75" stroke-linecap="round"/>
  <line x1="280" y1="132" x2="280" y2="52" stroke="#E5E5E5" stroke-width="1.75" stroke-linecap="round"/>
  <g stroke="#E5E5E5" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
    <path d="M40 52 L33 43 M40 52 L47 43"/>
    <path d="M280 52 L273 43 M280 52 L287 43"/>
  </g>

  <!-- Straight line-of-sight chord between the two antenna tops (dashed neutral, the "flat" path) -->
  <line x1="40" y1="52" x2="280" y2="52" stroke="#9C9C9C" stroke-width="1.25" stroke-dasharray="5 4"/>

  <!-- Bulge height at midpath (lime): from the chord (y=52) down to the arc apex (y=70) -->
  <g stroke="#A2CC3A" stroke-width="2" stroke-linecap="round">
    <line x1="160" y1="52" x2="160" y2="70"/>
    <path d="M157 57 L160 52 L163 57 M157 65 L160 70 L163 65"/>
  </g>
  <circle cx="160" cy="70" r="2.5" fill="#A2CC3A"/>
  <text x="170" y="66" fill="#A2CC3A" font-size="12" font-weight="500">bulge</text>

  <!-- Header -->
  <text x="160" y="20" fill="#E5E5E5" font-size="13" font-weight="500" text-anchor="middle">earth bulge over path</text>
  <!-- Footer note -->
  <text x="160" y="152" fill="#9C9C9C" font-size="11" font-weight="500" text-anchor="middle">exaggerated, not to scale</text>
</svg>
