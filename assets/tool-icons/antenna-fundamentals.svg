<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24">
  <g fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <!-- Antenna Fundamentals: the classic electrical-schematic aerial / antenna
         generic symbol (ref: electrical-symbols.com "Antenna - Aerial Generic
         Symbol"). A vertical mast rises from a short horizontal base; straight
         diagonal rays fan up-and-out from the TOP of the mast (a splayed
         aerial). No lobe, no loop, no curves — pure straight strokes so it
         reads unambiguously as "antenna" at the 20px floor. Replaces the prior
         teardrop-lobe versions that read as a hand-mirror / lollipop. -->
    <!-- vertical mast -->
    <path d="M12 21 V8"/>
    <!-- short horizontal base at the foot of the mast -->
    <path d="M9 21 H15"/>
    <!-- three straight aerial rays fanning up-and-out from the top of the mast -->
    <path d="M12 8 L5 3"/>
    <path d="M12 8 V2"/>
    <path d="M12 8 L19 3"/>
  </g>
</svg>
