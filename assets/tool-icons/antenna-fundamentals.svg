<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24">
  <g fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <!-- Antenna Fundamentals: a feed element on a mast projecting a single
         CLOSED directional main lobe (the polar-pattern beam the tool teaches —
         gain, beamwidth, lobe shape). Iterated three times: the open-loop+axis
         version read as a lollipop (Vera); a filled lobe read as an egg/blob at
         20px. This is a CLOSED (complete, no open mouth) OUTLINED teardrop lobe
         — a sharp pointed tip at the feed point swelling to a rounded far end —
         matching the stroke-based house style (cf. eirp, downtilt-coverage,
         which read far better outlined than filled at the 20px floor). No
         interior axis line. The closed pointed teardrop is an unmistakable
         directional radiation lobe, distinct from eirp's stacked broadcast arcs
         and downtilt-coverage's open beam wedge. -->
    <!-- mast with a ground base so the source reads as an antenna -->
    <path d="M4 21 V11"/>
    <path d="M1.5 21 H6.5"/>
    <!-- feed / radiating element node at the lobe tip -->
    <circle cx="4" cy="11" r="1.2" fill="currentColor" stroke="none"/>
    <!-- main lobe: a CLOSED outlined teardrop. Sharp tip at the feed (4,11),
         swelling to a rounded bulge to the upper-right, then back to the tip —
         a directional beam silhouette, not an egg. -->
    <path d="M4 11 C 8 3 21 4 21 10 C 21 16 9 17 4 11 Z"/>
  </g>
</svg>
