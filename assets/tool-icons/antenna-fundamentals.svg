<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24">
  <g fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <!-- Antenna Fundamentals: a radiating element on a mast with its main-lobe
         radiation pattern — the polar-plot beam the tool teaches (gain,
         beamwidth, the lobe shape). The teardrop lobe silhouette is distinct
         from eirp's stacked broadcast arcs and downtilt-coverage's beam wedge. -->
    <!-- mast with a ground base (so the source reads as an antenna, not a stick) -->
    <path d="M4 21 V8"/>
    <path d="M2 21 H6"/>
    <!-- radiating element node at the feed point -->
    <circle cx="4" cy="8" r="1.3" fill="currentColor" stroke="none"/>
    <!-- main lobe: a teardrop radiation pattern projecting out to the right -->
    <path d="M4 8 C 12 2 22 4 22 8 C 22 12 12 14 4 8 Z"/>
    <!-- beam axis through the lobe -->
    <path d="M4 8 H17"/>
  </g>
</svg>
