<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24">
  <g fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <!-- Dual Orbs on WLAN Pi: a single-board computer (the WLAN Pi) running TWO
         sensor orbs — one over Ethernet, one over Wi-Fi. The board with a GPIO
         header tick row PLUS two distinct sensor nodes is honest to "two Orb
         sensors on one device" and reads apart from freeradius-wlanpi (board +
         auth shield). -->
    <!-- WLAN Pi board -->
    <rect x="3" y="11" width="18" height="9" rx="1.5"/>
    <!-- GPIO header pin row -->
    <path d="M6 11 V9"/>
    <path d="M9 11 V9"/>
    <path d="M12 11 V9"/>
    <!-- two sensor orbs rising off the board (the dual Orbs) -->
    <circle cx="8" cy="15.5" r="1.4" fill="currentColor" stroke="none"/>
    <circle cx="16" cy="15.5" r="1.4" fill="currentColor" stroke="none"/>
    <path d="M16 11 V5"/>
    <circle cx="16" cy="4" r="1.4" fill="currentColor" stroke="none"/>
  </g>
</svg>
