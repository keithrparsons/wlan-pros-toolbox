name: CI

on:
  push:
  pull_request:

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          channel: stable

      # net_quality is a separate pure-Dart package with its own tests.
      - name: net_quality — analyze + test
        working-directory: packages/net_quality
        run: |
          flutter pub get
          flutter analyze
          flutter test

      # Root app: widget + unit tests run on Linux (no Xcode needed).
      # Two tag groups are excluded from the cross-platform Linux CI:
      #   - `capture` — figure GENERATORS that write image files (not assertions).
      #     Regenerate figures locally with: flutter test --tags capture
      #   - `golden`  — rendered-pixel golden comparisons. Linux renders fonts
      #     differently than the macOS host the baselines were generated on, so
      #     they diff 5-10% (well over tolerance) on this runner. Goldens are
      #     host-specific and are validated locally + on-device by Vera:
      #     flutter test --tags golden
      - name: app — analyze + test
        run: |
          flutter pub get
          flutter analyze
          flutter test --exclude-tags "capture || golden"

  # Windows build skeleton. Runs on GitHub's own windows-latest runner (no
  # local Windows box needed) to surface COMPILE issues in the dormant Native
  # Wifi FFI bridge + per-platform gating BEFORE the 2026-06-26 build day.
  #
  # This job builds only — it does not sign, package (MSIX), or run the suite.
  # The runtime FFI read against wlanapi.dll cannot be verified here: a headless
  # CI VM has no wireless NIC. Real-radio verification stays a 6/26 device task.
  #
  # Independent of the Linux job above (no `needs:`), so a Windows-build failure
  # never blocks the analyze/test gate, and vice versa.
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          channel: stable

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      # Compile-only smoke build of the x64 Windows runner. Proves the FFI
      # bridge + win32/ffi deps build clean. The branded Runner.rc and the
      # real app_icon.ico are compiled in by the runner's resource step.
      - name: app — build windows (x64, release)
        # The windows-latest runner ships CMake 4.x, which removed compatibility
        # for cmake_minimum_required(VERSION < 3.5). The pdfx plugin's bundled
        # pdfium downloader still declares an older minimum, so configuring it
        # errors out. This env tells CMake to treat such old minimums as 3.5,
        # the documented CMake-4 migration shim. Does not affect app code.
        env:
          CMAKE_POLICY_VERSION_MINIMUM: "3.5"
        run: |
          flutter pub get
          flutter build windows --release
