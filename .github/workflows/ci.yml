name: CI

on:
  push:
  pull_request:

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          channel: stable

      # net_quality is a separate pure-Dart package with its own tests.
      - name: net_quality — analyze + test
        working-directory: packages/net_quality
        run: |
          flutter pub get
          flutter analyze
          flutter test

      # Root app: widget + unit + golden tests run on Linux (no Xcode needed).
      # Goldens run here too: a tolerant comparator (test/flutter_test_config.dart)
      # absorbs sub-pixel cross-host font-hinting jitter while still failing real
      # regressions. Only `capture`-tagged figure GENERATORS (which write image
      # files) are excluded. Regenerate figures locally with: flutter test --tags capture
      - name: app — analyze + test
        run: |
          flutter pub get
          flutter analyze
          flutter test --exclude-tags capture
